name: Cinema Sync - VOX & Cineco Bahrain

# Cinema Scraper for BahrainNights
# Runs Monday, Wednesday, Friday at 6 AM Bahrain time (3 AM UTC)
# Scrapes VOX and Cineco cinemas using Playwright browser automation
# Deduplicates movies and updates the database with TMDB metadata

on:
  schedule:
    - cron: '0 3 * * 1,3,5'  # 3 AM UTC = 6 AM Bahrain | Mon, Wed, Fri
  workflow_dispatch:  # Allow manual runs

jobs:
  sync-cinema:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Cinema Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: npx tsx scripts/sync-cinema.ts